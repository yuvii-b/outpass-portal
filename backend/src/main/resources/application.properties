spring.application.name=portal

# =====================================================
# DATABASE CONFIGURATION
# =====================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:outpass_portal}?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# =====================================================
# JPA / HIBERNATE CONFIGURATION
# =====================================================
spring.jpa.hibernate.ddl-auto=validate

# Show SQL queries in console (set to false in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Naming strategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Second-level cache
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# Batch processing
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =====================================================
# JWT CONFIGURATION
# =====================================================
# JWT Secret Key (loaded from .env file)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_ACCESS_TOKEN_EXPIRATION:86400000}
# JWT Access Token Expiration (24 hours in milliseconds)
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:86400000}

# JWT Refresh Token Expiration (7 days in milliseconds)
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# JWT Issuer
jwt.issuer=${JWT_ISSUER:outpass-portal}

# =====================================================
# SECURITY CONFIGURATION
# =====================================================
# BCrypt password encoding strength
spring.security.password.strength=10

# =====================================================
# SERVER CONFIGURATION
# =====================================================
# Server port
server.port=${SERVER_PORT:8080}

# Context path
server.servlet.context-path=${SERVER_CONTEXT_PATH:/api}

# =====================================================
# LOGGING CONFIGURATION
# =====================================================
logging.level.root=INFO
logging.level.com.outpass.portal=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log file
logging.file.name=logs/outpass-portal.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =====================================================
# VALIDATION CONFIGURATION
# =====================================================
spring.web.resources.add-mappings=false

# =====================================================
# JACKSON CONFIGURATION
# =====================================================
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.default-property-inclusion=non_null

